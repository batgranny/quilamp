name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run build (Vite)
      run: npm run build
      env:
        NODE_ENV: production

    - name: Run tests
      run: npm test

    - name: Package (Pack only, no upload)
      run: npm run pack
      if: matrix.os == 'macos-latest'
