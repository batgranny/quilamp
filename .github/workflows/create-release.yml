name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v1.3.0). If empty, auto-increments patch version of last release.'
        required: false
        type: string
      release_name:
        description: 'Release name (optional, defaults to version tag)'
        required: false
        type: string
      is_draft:
        description: 'Create as Draft?'
        required: true
        type: boolean
        default: false
      is_prerelease:
        description: 'Create as Pre-release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run build (Vite)
        run: npm run build
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run tests
        run: npm test

  create-release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.determine_version.outputs.TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Version Tag
        id: determine_version
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "TAG=${{ inputs.version_tag }}" >> $GITHUB_OUTPUT
            echo "Calculated Tag: ${{ inputs.version_tag }} (from input)"
          else
            LATEST_TAG=$(gh release list -L 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "TAG=v1.0.0" >> $GITHUB_OUTPUT
              echo "Calculated Tag: v1.0.0 (default)"
            else
              CLEAN_TAG="${LATEST_TAG#v}"
              IFS='.' read -r major minor patch <<< "$CLEAN_TAG"
              if [ -z "$patch" ]; then
                echo "TAG=${LATEST_TAG}-1" >> $GITHUB_OUTPUT
                echo "Calculated Tag: ${LATEST_TAG}-1"
              else
                next_patch=$((patch + 1))
                if [[ $LATEST_TAG == v* ]]; then
                  echo "TAG=v${major}.${minor}.${next_patch}" >> $GITHUB_OUTPUT
                  echo "Calculated Tag: v${major}.${minor}.${next_patch}"
                else
                  echo "TAG=${major}.${minor}.${next_patch}" >> $GITHUB_OUTPUT
                  echo "Calculated Tag: ${major}.${minor}.${next_patch}"
                fi
              fi
            fi
          fi

      - name: Generate Release Notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ steps.determine_version.outputs.TAG }}" | jq -r .body > release_notes.md || echo "Release Notes" > release_notes.md

          cat << 'EOF' >> release_notes.md

          ---

          ## 📥 Installation Guide

          ### macOS
          Download the appropriate `.dmg` file for your Mac:
          - **Apple Silicon (M1/M2/M3)**: Choose `Quilamp-*-arm.dmg`
          - **Intel Macs**: Choose `Quilamp-*-intel.dmg`

          1. Double-click the `.dmg` file to mount it.
          2. Drag the **Quilamp** app into your `Applications` folder.
          3. **Important**: Because Quilamp is currently unsigned by an official Apple Developer certificate, macOS might show a warning that the app is "damaged" or "cannot be opened." 
             * **Fix**: Right-click (or Control-click) the Quilamp icon in your Applications folder and select **Open**. You only need to do this the very first time!

          ### Windows
          - Download the `Quilamp Setup *.exe` file.
          - Double-click to run the installer.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.determine_version.outputs.TAG }}
          name: ${{ inputs.release_name || steps.determine_version.outputs.TAG }}
          draft: ${{ inputs.is_draft }}
          prerelease: ${{ inputs.is_prerelease }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npx vite build

      - name: Build Silicon App (Dir)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: npx electron-builder --dir --mac --arm64 --publish never

      - name: Ad-hoc Sign Silicon App
        run: |
          xattr -cr release/mac-arm64/Quilamp.app
          codesign --force --deep --sign - release/mac-arm64/Quilamp.app

      - name: Create Silicon DMG (User-Friendly)
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          mkdir -p release/dmg_staging
          cp -R release/mac-arm64/Quilamp.app release/dmg_staging/
          ln -s /Applications release/dmg_staging/Applications
          hdiutil create -volname "Quilamp" -srcfolder release/dmg_staging -ov -format UDZO release/Quilamp-${APP_VERSION}-arm.dmg

      - name: Build Intel DMG
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          npx electron-builder --mac dmg --x64 --publish never
          mv release/Quilamp-${APP_VERSION}.dmg release/Quilamp-${APP_VERSION}-intel.dmg
          rm -f release/*.zip # Remove generated zip to keep assets clean

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.release_tag }}
          files: release/Quilamp-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

  build-win:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npx vite build

      - name: Build Windows App
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.release_tag }}
          files: release/Quilamp Setup *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
