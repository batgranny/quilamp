<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>About Quilamp</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c2c2c;
            color: #ffffff;
            margin: 0;
            padding: 30px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .version {
            opacity: 0.6;
            margin-bottom: 30px;
        }

        .credits {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.8;
        }

        .link {
            color: #4facfe;
            text-decoration: none;
            cursor: pointer;
        }

        .close-btn {
            margin-top: 20px;
            padding: 8px 20px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        .close-btn:hover {
            background-color: #555;
        }
    </style>
</head>

<body>
    <div class="logo">Quilamp</div>
    <div class="version">Version 1.1.0</div>
    <div class="credits">
        A modern, cross-platform media player inspired by the classic Winamp.<br><br>
        Developed by <strong>Batgranny</strong><br>
        Built with Electron, Vite, and Vanilla JS.<br><br>
        <div class="link" id="github-link">GitHub Repository</div>
    </div>

    <script>
        // Open GitHub link in system browser
        document.getElementById('github-link').addEventListener('click', (e) => {
            e.preventDefault();
            const url = 'https://github.com/chrisconnolly/quinamp';
            if (window.electronAPI && window.electronAPI.openExternal) {
                window.electronAPI.openExternal(url);
            }
        });
    </script>
</body>

</html>
