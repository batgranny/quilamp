<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>About Quilamp</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c2c2c;
            color: #ffffff;
            margin: 0;
            padding: 30px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .version {
            opacity: 0.6;
            margin-bottom: 30px;
        }

        .credits {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.8;
        }

        .link {
            color: #4facfe;
            text-decoration: none;
            cursor: pointer;
        }

        .close-btn {
            margin-top: 20px;
            padding: 8px 20px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        .close-btn:hover {
            background-color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Quinamp</h1>
        <div class="tagline">The Ultimate Winamp Clone for macOS</div>
        <div class="info">
            <p>Version: <span id="version">1.2.0-alpha.0</span></p>
            <p>Build Date: <span id="build-date">March 12, 2026</span></p>
            <p>Author: Batgranny</p>
            <p>GitHub: <a href="#" id="github-link">github.com/chrisconnolly/quinamp</a></p>
        </div>
        <button class="close-btn" id="close-btn">Close</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Close button logic
        document.getElementById('close-btn').addEventListener('click', () => {
            window.close();
        });

        // Open GitHub link in system browser
        document.getElementById('github-link').addEventListener('click', (e) => {
            e.preventDefault();
            const url = 'https://github.com/chrisconnolly/quinamp';
            window.parent.postMessage({ type: 'open-external', url: url }, '*');
            // Alternatively, if we have shell access in preload:
            if (window.electronAPI && window.electronAPI.openExternal) {
                window.electronAPI.openExternal(url);
            }
        });

        // Listen for data from main process if needed
        window.addEventListener('message', (event) => {
            // Handle data
        });
    </script>
</body>

</html>
