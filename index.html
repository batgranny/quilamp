<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quilamp</title>
    <!-- We will use a web font for the digital display, and system fonts for others -->
    <link
        href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/sf-digital-readout" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
    <link rel="icon" href="./build/icon.svg" type="image/svg+xml">
</head>

<body>
    <div id="app-container">
        <!-- The main winamp player UI -->
        <div id="player-container">
            <div id="title-bar" class="drag-region">
                <div class="window-controls no-drag">
                    <button id="btn-minimize" class="ctrl-btn">_</button>
                    <button id="btn-close" class="ctrl-btn">x</button>
                </div>
            </div>

            <div id="main-display">
                <div class="main-top-row">
                    <div id="time-display" class="digital-font">00:00</div>

                    <div class="visualizer">
                        <!-- placeholder for visualizer or static lines -->
                    </div>

                    <div id="track-info">
                        <div id="track-name" class="marquee">
                            <span>*** QUILAMP *** WINAMP CLONE ***</span>
                        </div>
                        <div class="audio-stats">
                            <span id="kbps">128</span> kbps
                            <span id="khz">44</span> kHz
                        </div>
                    </div>
                </div>

                <!-- Custom Seek Slider -->
                <div id="seek-slider" class="custom-slider no-drag" title="Seek">
                    <div class="slider-thumb" id="seek-thumb"></div>
                </div>
            </div>

            <div id="controls-panel">
                <!-- Custom Volume Slider -->
                <div id="volume-slider" class="custom-slider no-drag" title="Volume">
                    <div class="slider-fill" id="volume-fill"></div>
                    <div class="slider-thumb" id="volume-thumb"></div>
                </div>
                <!-- Custom Pan Slider -->
                <div id="pan-slider" class="custom-slider no-drag" title="Pan">
                    <div class="slider-fill" id="pan-fill"></div>
                    <div class="slider-thumb" id="pan-thumb"></div>
                </div>

                <div class="playback-controls no-drag">
                    <button id="btn-prev" class="play-btn" title="Previous"><svg viewBox="0 0 10 10">
                            <rect x="1" y="2" width="1.5" height="6" />
                            <polygon points="2.5,5 8,2 8,8" />
                        </svg></button>
                    <button id="btn-play" class="play-btn" title="Play"><svg viewBox="0 0 10 10">
                            <polygon points="2,2 8,5 2,8" />
                        </svg></button>
                    <button id="btn-pause" class="play-btn" title="Pause"><svg viewBox="0 0 10 10">
                            <rect x="2" y="2" width="2" height="6" />
                            <rect x="6" y="2" width="2" height="6" />
                        </svg></button>
                    <button id="btn-stop" class="play-btn" title="Stop"><svg viewBox="0 0 10 10">
                            <rect x="2" y="2" width="6" height="6" />
                        </svg></button>
                    <button id="btn-next" class="play-btn" title="Next"><svg viewBox="0 0 10 10">
                            <polygon points="2,2 7.5,5 2,8" />
                            <rect x="7.5" y="2" width="1.5" height="6" />
                        </svg></button>
                    <button id="btn-eject" class="play-btn" title="Open File(s)"><svg viewBox="0 0 10 10">
                            <polygon points="5,2 8,5 2,5" />
                            <rect x="2" y="6" width="6" height="1.5" />
                        </svg></button>
                    <button id="btn-shuffle" class="toggle-btn" title="Shuffle"><svg viewBox="0 0 10 10">
                            <path d="M1,2.5 L3,2.5 L7,7.5 L9,7.5" fill="none" stroke="currentColor" stroke-width="1" />
                            <path d="M1,7.5 L3,7.5 L4.2,6.3 M5.8,3.7 L7,2.5 L9,2.5" fill="none" stroke="currentColor"
                                stroke-width="1" />
                            <polygon points="9,7.5 7,6.5 7,8.5" fill="currentColor" />
                            <polygon points="9,2.5 7,1.5 7,3.5" fill="currentColor" />
                        </svg></button>
                    <button id="btn-repeat" class="toggle-btn" title="Repeat"><svg viewBox="0 0 10 10">
                            <path d="M2,3 L8,3 A2,2 0 0,1 10,5 A2,2 0 0,1 8,7 L2,7 A2,2 0 0,1 0,5 A2,2 0 0,1 2,3"
                                fill="none" stroke="currentColor" stroke-width="1" />
                            <polygon points="4,2 6,3 4,4" fill="currentColor" />
                            <polygon points="6,6 4,7 6,8" fill="currentColor" />
                        </svg></button>
                </div>
            </div>
        </div>

        <div id="playlist-container">
            <div id="playlist-inner">
                <div id="playlist-title-bar" class="drag-region">
                    <div class="title-text">QUILAMP PLAYLIST</div>
                    <div class="playlist-window-controls no-drag">
                        <button id="pl-btn-close" class="ctrl-btn">x</button>
                    </div>
                </div>
                <div id="playlist-box">
                    <ul id="playlist-items" class="no-drag">
                        <!-- Dynamically populated -->
                    </ul>
                </div>
                <!-- Custom GUI scrollbar (always visible, fixed size handle) -->
                <div id="playlist-scrollbar" class="no-drag">
                    <div id="playlist-scroll-thumb"></div>
                </div>
                <div id="playlist-bottom" class="drag-region">
                    <div class="pl-left-actions">
                        <button id="pl-btn-add" class="pl-action-btn no-drag" title="Add files">ADD</button>
                        <button id="pl-btn-rem" class="pl-action-btn no-drag" title="Remove files">REM</button>
                        <button id="pl-btn-sel" class="pl-action-btn no-drag" title="Select files">SEL</button>
                        <button id="pl-btn-misc" class="pl-action-btn no-drag" title="Misc options">MISC</button>
                    </div>
                    <div class="pl-right-actions">
                        <button id="pl-btn-list-opts" class="pl-action-btn no-drag" title="List options">LIST</button>
                        <div id="pl-list-opts-menu" class="collapsed">
                            <button id="pl-btn-list-new" class="pl-list-btn no-drag" title="New List">NEW</button>
                            <button id="pl-btn-list-save" class="pl-list-btn no-drag" title="Save List">SAVE</button>
                            <button id="pl-btn-list-load" class="pl-list-btn no-drag" title="Load List">LOAD</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/renderer.js"></script>
</body>

</html>
