<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quillamp Visualizer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #preset-display {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        #preset-display.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="preset-display"></div>
    <canvas id="canvas"></canvas>
    <script type="module" src="./src/visualizer.js"></script>
</body>
</html>
